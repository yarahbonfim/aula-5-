<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabuada</title>
</head>
<body>
    <h2>Estudar a Tabuada</h2>
    <input type="number" id="num" placeholder="Digite o numero para saber a tabuada">
    <button onclick="gerar()">Gerar a Tabuada</button>
    <div id="resultado"></div>

    <script>
        function gerar(){
            let n = document.getElementById("num").value;
            let res = document.getElementById("resultado");
            //Limpa o resultado anterior
            res.innerHTML="";
            for (let i = 1; i <= 10;i++){
                //Aqui usamos o "+" para "colar" os pedaços
                res.innerHTML += n + "x" +i+ "=" + (n*i) +"<br>";
            }
        }
    </script>
    
</body>
</html>
